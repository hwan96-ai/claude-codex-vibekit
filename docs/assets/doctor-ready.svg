    <text x="20" y="152" fill="#cdd6f4">hooks                : <tspan fill="#a6e3a1">verified</tspan></text>
    <text x="20" y="176" fill="#cdd6f4">optional integrations: <tspan fill="#f9e2af">partial</tspan></text>
    <text x="20" y="216" fill="#6c7086">PARTIAL is not a failure — core works,</text>
    <text x="20" y="236" fill="#6c7086">some optional integrations not installed.</text>
  </g>
</svg>
