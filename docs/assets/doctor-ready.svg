<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 260" role="img" aria-label="doctor.sh terminal output: READY">
  <title>doctor.sh — READY</title>
  <desc>Illustrative terminal card showing doctor.sh output: READY with commands ok, hooks verified, optional integrations partial.</desc>
  <rect width="640" height="260" rx="10" ry="10" fill="#1e1e2e"/>
  <rect x="0" y="0" width="640" height="28" rx="10" ry="10" fill="#313244"/>
  <circle cx="16" cy="14" r="6" fill="#f38ba8"/>
  <circle cx="36" cy="14" r="6" fill="#f9e2af"/>
  <circle cx="56" cy="14" r="6" fill="#a6e3a1"/>
  <text x="320" y="19" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" fill="#cdd6f4">doctor</text>
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14">
    <text x="20" y="64" fill="#cdd6f4"><tspan fill="#a6e3a1">$</tspan> ./doctor.sh</text>
    <text x="20" y="96" fill="#a6e3a1" font-weight="700">READY</text>
